log_format combined_hw '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name _;

    # ВАЖНО: пишем в отдельный реальный файл, а НЕ в access.log.
    # При монтировании named volume на /var/log/nginx из образа nginx копируется
    # симлинк access.log -> /dev/stdout, поэтому туда писать в файл нельзя.
    access_log /var/log/nginx/hw_access.log combined_hw;
    error_log  /var/log/nginx/error.log warn;

    location / {
        return 200 "hello from nginx homework\n";
        add_header Content-Type text/plain;
    }

    location /health {
        return 200 "ok\n";
    }
}
