# ELK 7.17 homework stack: Elasticsearch + Kibana + Nginx + (Logstash | Filebeat)
#
# Профили:
#   docker compose --profile logstash up -d   -> Задание 3 (Nginx -> Logstash -> ES)
#   docker compose --profile filebeat up -d   -> Задание 4 (Nginx -> Filebeat -> ES)
#
# Базовые сервисы (es, kibana, nginx) поднимаются всегда.
services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-7.17.22}
    container_name: hw-elasticsearch
    environment:
      # Задание 1: нестандартное имя кластера. Поменяй на своё случайное значение.
      - cluster.name=${CLUSTER_NAME:-anna-elk-7f3a9c}
      - node.name=hw-node-1
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [elk]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-7.17.22}
    container_name: hw-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

  nginx:
    image: nginx:1.25
    container_name: hw-nginx
    # Монтируем volume на /var/log/nginx -> перекрывает дефолтный symlink access.log->stdout,
    # поэтому Nginx пишет НАСТОЯЩИЙ файл, который читают Logstash/Filebeat.
    volumes:
      - nginxlog:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
    networks: [elk]

  # --- Задание 3 ---
  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-7.17.22}
    container_name: hw-logstash
    profiles: ["logstash"]
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - nginxlog:/var/log/nginx:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

  # --- Задание 4 ---
  filebeat:
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION:-7.17.22}
    container_name: hw-filebeat
    profiles: ["filebeat"]
    user: root
    command: ["filebeat", "-e", "-strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginxlog:/var/log/nginx:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

volumes:
  esdata:
  nginxlog:

networks:
  elk:
    driver: bridge
